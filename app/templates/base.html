<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Osc-PRA</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  {% if user %}
  <header class="topbar">
    <span class="brand">Osc-PRA</span>
    <nav>
      <a href="/suivi">Suivi</a>
      {% if user.is_admin %}
      <a href="/admin/parametres">Paramètres</a>
      <a href="/admin/comptes">Comptes</a>
      <a href="/admin/plans">Plans</a>
      {% endif %}
    </nav>
    <form method="post" action="/logout" class="logout-form">
      <span>{{ user.username }}</span>
      <button type="submit">Déconnexion</button>
    </form>
  </header>
  {% endif %}
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
