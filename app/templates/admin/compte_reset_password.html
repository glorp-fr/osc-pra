{% extends "base.html" %}
{% block content %}
<div class="stitle" style="margin-bottom:16px">Réinitialiser le mot de passe de « {{ account.username }} »</div>
{% if error %}<div class="err-banner" style="margin-bottom:16px">{{ error }}</div>{% endif %}

<div class="card">
  <div class="pbody">
    <form method="post" action="/admin/comptes/{{ account.id }}/reinitialiser">
      <label>Nouveau mot de passe <input type="password" name="password" required minlength="8"></label>
      <label>Confirmation <input type="password" name="password_confirm" required minlength="8"></label>
      <div style="display:flex;gap:10px">
        <a href="/admin/comptes" class="btn ghost">Annuler</a>
        <button type="submit" class="btn blue">Réinitialiser</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
