{% extends "base.html" %}
{% block content %}
<div class="stitle" style="margin-bottom:16px">Nouveau plan de reprise</div>
{% if error %}<div class="err-banner" style="margin-bottom:16px">{{ error }}</div>{% endif %}

<form method="post" action="/admin/plans/nouveau">
  <fieldset>
    <legend>Général</legend>
    <label>Nom du plan <input type="text" name="name" required></label>
  </fieldset>

  <fieldset>
    <legend>AK/SK source</legend>
    <label>Région source <input type="text" name="source_region" placeholder="ex: eu-west-2"></label>
    <label>AK <input type="text" name="source_ak"></label>
    <label>SK <input type="password" name="source_sk"></label>
    <button type="button" class="btn sm ghost" hx-post="/admin/plans/octl/test-ak" hx-include="closest form" hx-target="#ak-status" hx-swap="innerHTML">Tester l'AK/SK</button>
    <div id="ak-status"></div>
  </fieldset>

  <fieldset>
    <legend>Cible de réplication</legend>
    <label>
      <select name="target_type" id="target_type" onchange="document.getElementById('cross-region-fields').hidden = this.value !== 'autre_region'">
        <option value="meme_region">Même région</option>
        <option value="autre_region">Autre région</option>
      </select>
    </label>
    <div id="cross-region-fields" hidden style="display:flex;flex-direction:column;gap:10px">
      <label>Région <input type="text" name="target_region" placeholder="ex: eu-west-2"></label>
      <label>Endpoint S3 de synchro <input type="text" name="sync_endpoint"></label>
      <label>Bucket S3 de synchro <input type="text" name="sync_bucket"></label>
      <label>AK S3 <input type="text" name="sync_ak"></label>
      <label>SK S3 <input type="password" name="sync_sk"></label>
      <label>Snapshots à conserver côté cible <input type="number" min="1" name="target_retain_count" value="7"></label>
    </div>
  </fieldset>

  <fieldset>
    <legend>VMs à répliquer</legend>
    <button type="button" class="btn sm ghost" hx-post="/admin/plans/octl/scan-vms" hx-include="closest form" hx-target="#vm-list" hx-swap="innerHTML">Scanner les VMs</button>
    <div id="vm-list"><p class="hint">Renseigne l'AK, le SK et la région source ci-dessus puis clique sur « Scanner les VMs ».</p></div>
  </fieldset>

  <fieldset>
    <legend>Snapshots côté production</legend>
    <label>Fréquence de snapshot <input type="text" name="snapshot_frequency" placeholder="ex: quotidienne" required></label>
    <label>Snapshots à conserver <input type="number" min="1" name="source_retain_count" value="7"></label>
  </fieldset>

  <button type="submit" class="btn blue">Créer le plan</button>
</form>
{% endblock %}
